<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)" />

  <!-- Left decorative code block -->
  <rect x="72" y="180" width="380" height="280" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1" opacity="0.9"/>
  <rect x="72" y="180" width="380" height="40" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <rect x="72" y="208" width="380" height="12" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="100" cy="200" r="6" fill="#ff5f57"/>
  <circle cx="120" cy="200" r="6" fill="#ffbd2e"/>
  <circle cx="140" cy="200" r="6" fill="#28c840"/>
  <!-- Code lines -->
  <rect x="92" y="240" width="120" height="8" rx="4" fill="#d97706" opacity="0.8"/>
  <rect x="92" y="262" width="200" height="8" rx="4" fill="#58a6ff" opacity="0.6"/>
  <rect x="108" y="284" width="160" height="8" rx="4" fill="#7ee787" opacity="0.6"/>
  <rect x="108" y="306" width="240" height="8" rx="4" fill="#e6edf3" opacity="0.3"/>
  <rect x="108" y="328" width="180" height="8" rx="4" fill="#7ee787" opacity="0.6"/>
  <rect x="92" y="350" width="140" height="8" rx="4" fill="#58a6ff" opacity="0.6"/>
  <rect x="108" y="372" width="220" height="8" rx="4" fill="#e6edf3" opacity="0.3"/>
  <rect x="92" y="394" width="100" height="8" rx="4" fill="#d97706" opacity="0.8"/>
  <rect x="108" y="416" width="260" height="8" rx="4" fill="#e6edf3" opacity="0.2"/>

  <!-- Right decorative code block -->
  <rect x="828" y="180" width="380" height="280" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1" opacity="0.9"/>
  <rect x="828" y="180" width="380" height="40" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <rect x="828" y="208" width="380" height="12" fill="#21262d"/>
  <circle cx="856" cy="200" r="6" fill="#ff5f57"/>
  <circle cx="876" cy="200" r="6" fill="#ffbd2e"/>
  <circle cx="896" cy="200" r="6" fill="#28c840"/>
  <!-- Code lines -->
  <rect x="848" y="240" width="160" height="8" rx="4" fill="#f78166" opacity="0.7"/>
  <rect x="848" y="262" width="280" height="8" rx="4" fill="#e6edf3" opacity="0.3"/>
  <rect x="864" y="284" width="200" height="8" rx="4" fill="#7ee787" opacity="0.6"/>
  <rect x="864" y="306" width="140" height="8" rx="4" fill="#58a6ff" opacity="0.6"/>
  <rect x="864" y="328" width="240" height="8" rx="4" fill="#e6edf3" opacity="0.2"/>
  <rect x="848" y="350" width="180" height="8" rx="4" fill="#d97706" opacity="0.8"/>
  <rect x="864" y="372" width="200" height="8" rx="4" fill="#7ee787" opacity="0.6"/>
  <rect x="848" y="394" width="120" height="8" rx="4" fill="#58a6ff" opacity="0.6"/>
  <rect x="864" y="416" width="260" height="8" rx="4" fill="#e6edf3" opacity="0.2"/>

  <!-- Center content -->
  <!-- Pill badge -->
  <rect x="540" y="168" width="200" height="30" rx="15" fill="#21262d" stroke="#d97706" stroke-width="1"/>
  <text x="640" y="188" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#d97706" text-anchor="middle" letter-spacing="1">CLAUDE CODE SKILL</text>

  <!-- Main title -->
  <text x="640" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#e6edf3" text-anchor="middle">Managed Agents</text>
  <text x="640" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" text-anchor="middle">
    <tspan fill="url(#accent)" filter="url(#glow)">Skill</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="384" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Build better Claude agents, faster.</text>

  <!-- Divider -->
  <rect x="540" y="408" width="200" height="1" fill="#30363d"/>

  <!-- Tags row -->
  <text x="420" y="438" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#58a6ff" text-anchor="middle">event loops</text>
  <text x="530" y="438" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#8b949e" text-anchor="middle">·</text>
  <text x="640" y="438" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#7ee787" text-anchor="middle">MCP auth</text>
  <text x="750" y="438" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#8b949e" text-anchor="middle">·</text>
  <text x="860" y="438" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#d97706" text-anchor="middle">production patterns</text>

  <!-- Bottom line -->
  <text x="640" y="500" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#484f58" text-anchor="middle">github.com/0xArx/claude-managed-agents-skill</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
